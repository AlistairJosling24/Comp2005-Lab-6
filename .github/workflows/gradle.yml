name: Gradle Test Workflow

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Run tests
        run: bash ./gradlew test