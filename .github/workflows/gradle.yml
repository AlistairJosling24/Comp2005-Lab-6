name: Gradle Test Workflow

on:
  push:
    branches: [ "master" ]   # ⚠️ YOU ARE USING MASTER

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔥 FORCE permission again (important even if already set)
      - run: chmod +x ./gradlew

      - run: ./gradlew test